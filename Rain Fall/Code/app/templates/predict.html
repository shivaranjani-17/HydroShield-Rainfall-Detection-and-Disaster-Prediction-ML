<!DOCTYPE html>
<html>
<head>
    <title>HydroShield</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url('https://img.freepik.com/premium-photo/storm-with-heavy-rainfall-caused-major-flooding-background-ai-generated_768733-34060.jpg') no-repeat center center fixed;
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .form-box {
            background-color: rgba(255, 255, 255, 0.92);
            border-radius: 20px;
            padding: 30px;
            margin-top: 80px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        .btn-custom {
            background-color: #007BFF;
            color: white;
        }
        h2 {
            text-shadow: 1px 1px 2px #000000;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 form-box">
                <h2 class="text-center mb-4">HydroShield</h1>
                <h2 class="text-center mb-4">🌧️ Rainfall & Flood Risk Prediction</h2>
                <form method="POST" action="/predict">
                    <div class="mb-3">
                        <label for="location" class="form-label">Location</label>
                        <input type="text" class="form-control" name="location" required placeholder="e.g., Chennai">
                    </div>
                    <div class="mb-3">
                        <label for="temperature" class="form-label">Temperature (°C)</label>
                        <input type="number" step="0.1" class="form-control" name="temperature" required>
                    </div>
                    <div class="mb-3">
                        <label for="humidity" class="form-label">Humidity (%)</label>
                        <input type="number" class="form-control" name="humidity" required>
                    </div>
                    <div class="mb-3">
                        <label for="pressure" class="form-label">Pressure (hPa)</label>
                        <input type="number" class="form-control" name="pressure" required>
                    </div>
                    <div class="mb-3">
                        <label for="wind_speed" class="form-label">Wind Speed (km/h)</label>
                        <input type="number" step="0.1" class="form-control" name="wind_speed" required>
                    </div>
                    <button type="submit" class="btn btn-custom w-100">Predict</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
